<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bot API Docs</title>
    <style>
        body { font-family: sans-serif; background: #2c2f33; color: white; padding: 40px; }
        .card { background: #23272a; padding: 20px; border-radius: 8px; border: 1px solid #7289da; }
        select, pre { width: 100%; padding: 10px; margin-top: 10px; border-radius: 4px; }
        pre { background: #000; color: #0f0; overflow-x: auto; }
        label { font-weight: bold; color: #7289da; }
    </style>
</head>
<body>
    <h1>🛰️ Bot API Control Center</h1>
    <div class="card">
        <label for="apiSelect">Select API Endpoint to Inspect:</label>
        <select id="apiSelect" onchange="updateDocs()">
            <option value="start">POST /api/giveaway/start</option>
            <option value="enter">POST /api/giveaway/enter</option>
            <option value="view">GET /api/giveaway/:id</option>
        </select>

        <div id="details">
            <h3>What the Bot should send:</h3>
            <pre id="jsonExample"></pre>
            <h3>What it does:</h3>
            <p id="description"></p>
        </div>
    </div>

    <script>
        const docs = {
            start: {
                desc: "Tells the API to create a new giveaway unique to a server.",
                json: { serverId: "12345", duration: 5, winnersCount: 1, prize: "Nitro" }
            },
            enter: {
                desc: "Adds a username to the entrants list for a specific ID.",
                json: { giveawayId: "uuid-goes-here", username: "Wumpus#0001" }
            },
            view: {
                desc: "Returns the full list of entrants and time remaining.",
                json: "No body required. Just use the URL."
            }
        };

        function updateDocs() {
            const val = document.getElementById('apiSelect').value;
            document.getElementById('jsonExample').textContent = JSON.stringify(docs[val].json, null, 4);
            document.getElementById('description').textContent = docs[val].desc;
        }
        updateDocs();
    </script>
</body>
</html>
