<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TITAN SLAYER: VERTICAL MANEUVER</title>
    <style>
        body { margin: 0; background: #070a07; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui {
            position: absolute; inset: 20px; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .hud-box { color: #fff; text-shadow: 2px 2px #000; border-left: 4px solid #0ff; padding-left: 10px; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; border: 1px solid rgba(0,255,255,0.3);
        }
        #instructions {
            position: absolute; bottom: 10%; width: 100%; text-align: center;
            color: #aaa; font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="hud-box">
        <div style="font-size: 2rem;">KILLS: <span id="score">0</span></div>
        <div>GAS: <div style="width:150px; height:8px; background:#222;"><div id="gas-fill" style="width:100%; height:100%; background:#0ff;"></div></div></div>
    </div>
</div>

<div id="crosshair"></div>
<div id="instructions">CLICK TO LOCK MOUSE | O & P TO GRAPPLE | LEFT CLICK TO SLASH</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let w, h, midX, midY;
let score = 0, gas = 100, swordTimer = 0;
let gameActive = false;

// Physics Config
const GRAVITY = 0.2;
const ROPE_LENGTH = 1200;
const TENSION = 0.8;

// Player
let p = { x: 0, y: -400, z: 0, vx: 0, vy: 0, vz: 0, yaw: 0, pitch: 0 };
let hooks = { o: null, p: null };
let keys = {};

// World
let trees = [], titans = [];
for(let i=0; i<80; i++) {
    trees.push({ x: (Math.random()-0.5)*15000, z: (Math.random()-0.5)*15000, r: 30+Math.random()*40, h: 1000+Math.random()*1000 });
}

function spawnTitans() {
    for(let i=0; i<15; i++) {
        titans.push({ x: (Math.random()-0.5)*12000, z: (Math.random()-0.5)*12000, h: 400+Math.random()*400, alive: true });
    }
}
spawnTitans();

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    midX = w/2; midY = h/2;
}
window.addEventListener('resize', resize);
resize();

canvas.addEventListener('click', () => {
    canvas.requestPointerLock();
    gameActive = true;
    if(gameActive) swordTimer = 10; // Trigger sword slash
});

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) {
        p.yaw += e.movementX * 0.003;
        p.pitch -= e.movementY * 0.002;
        p.pitch = Math.max(-1.5, Math.min(1.5, p.pitch));
    }
});

function findAnchor() {
    let best = null, minDist = 2500;
    trees.forEach(t => {
        let dx = t.x - p.x, dz = t.z - p.z;
        let dist = Math.sqrt(dx*dx + dz*dz);
        // Simplified check: Hook trees near where we look
        if(dist < minDist) {
            minDist = dist;
            best = { x: t.x, y: -t.h * 0.9, z: t.z, dist: dist };
        }
    });
    return best;
}

function updatePhysics() {
    if(!gameActive) return;

    // Grapple Tension Math
    ['o', 'p'].forEach(key => {
        if(keys[key]) {
            if(!hooks[key]) hooks[key] = findAnchor();
            if(hooks[key]) {
                let a = hooks[key];
                let dx = a.x - p.x, dy = a.y - p.y, dz = a.z - p.z;
                let d = Math.sqrt(dx*dx + dy*dy + dz*dz);
                
                // Pull force
                let pull = (d - 100) * 0.005; 
                p.vx += (dx/d) * pull;
                p.vy += (dy/d) * pull;
                p.vz += (dz/d) * pull;
            }
        } else { hooks[key] = null; }
    });

    if(keys[' ' ] && gas > 0) {
        p.vx += Math.sin(p.yaw) * 0.6;
        p.vz += Math.cos(p.yaw) * 0.6;
        p.vy -= 0.4; gas -= 0.3;
    } else { gas = Math.min(100, gas + 0.1); }

    p.vy += GRAVITY;
    p.vx *= 0.98; p.vy *= 0.98; p.vz *= 0.98;
    p.x += p.vx; p.y += p.vy; p.z += p.vz;

    if(p.y > 0) { p.y = 0; p.vy = 0; }
    if(swordTimer > 0) swordTimer--;

    // Combat
    titans.forEach(t => {
        if(!t.alive) return;
        let dx = t.x - p.x, dy = (-t.h * 0.9) - p.y, dz = t.z - p.z;
        let dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if(dist < 150 && swordTimer > 0) {
            t.alive = false; score++;
            document.getElementById('score').innerText = score;
        }
    });
    document.getElementById('gas-fill').style.width = gas + '%';
}

function project(x, y, z) {
    let dx = x - p.x, dy = y - p.y, dz = z - p.z;
    let rx = dx * Math.cos(-p.yaw) - dz * Math.sin(-p.yaw);
    let rz = dx * Math.sin(-p.yaw) + dz * Math.cos(-p.yaw);
    let ry = dy * Math.cos(-p.pitch) - rz * Math.sin(-p.pitch);
    let fz = dy * Math.sin(-p.pitch) + rz * Math.cos(-p.pitch);
    if(fz < 50) return null;
    let s = 1000 / fz;
    return { x: midX + rx * s, y: midY + ry * s, s: s };
}

function draw() {
    // Atmosphere
    let sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, '#1a202c'); sky.addColorStop(1, '#2d3748');
    ctx.fillStyle = sky; ctx.fillRect(0,0,w,h);

    // Sort objects by depth
    let scene = [...trees.map(t=>({...t, type:'tree'})), ...titans.map(t=>({...t, type:'titan'}))];
    scene.sort((a,b) => (Math.pow(b.x-p.x,2)+Math.pow(b.z-p.z,2)) - (Math.pow(a.x-p.x,2)+Math.pow(a.z-p.z,2)));

    scene.forEach(obj => {
        let pos = project(obj.x, 0, obj.z);
        if(!pos) return;

        if(obj.type === 'tree') {
            // Trunk
            ctx.fillStyle = '#2d1a0a';
            ctx.fillRect(pos.x - obj.r*pos.s, pos.y - obj.h*pos.s, obj.r*2*pos.s, obj.h*pos.s);
            // Foliage
            ctx.fillStyle = '#1a3a1a';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y - obj.h*pos.s, obj.r*4*pos.s, 0, Math.PI*2);
            ctx.fill();
        } else if(obj.alive) {
            // Titan
            ctx.fillStyle = '#e2e8f0';
            ctx.fillRect(pos.x - 50*pos.s, pos.y - obj.h*pos.s, 100*pos.s, obj.h*pos.s);
            // Nape (Red Spot)
            ctx.fillStyle = '#f00';
            ctx.fillRect(pos.x - 20*pos.s, pos.y - obj.h*pos.s*0.95, 40*pos.s, 30*pos.s);
        }
    });

    // Ropes
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ['o', 'p'].forEach(k => {
        if(hooks[k]) {
            let hp = project(hooks[k].x, hooks[k].y, hooks[k].z);
            if(hp) { ctx.beginPath(); ctx.moveTo(k === 'o' ? w*0.3 : w*0.7, h); ctx.lineTo(hp.x, hp.y); ctx.stroke(); }
        }
    });

    // Sword Visuals
    if(swordTimer > 0) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(midX, midY, 150, 0, Math.PI/2);
        ctx.stroke();
    }

    updatePhysics();
    requestAnimationFrame(draw);
}

resize();
draw();
</script>
</body>
</html>
