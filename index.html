<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TITAN SLAYER: INFINITE FOREST</title>
    <style>
        body { margin: 0; background: #1a202c; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.8); border-radius: 50%;
        }
        #msg {
            position: absolute; top: 40%; width: 100%; text-align: center;
            color: white; background: rgba(0,0,0,0.6); padding: 20px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 24px;">KILLS: <span id="score">0</span></div>
    <div id="gas-ui" style="width: 200px; height: 10px; border: 1px solid #fff; margin-top: 5px;">
        <div id="gas-bar" style="width: 100%; height: 100%; background: #0ff;"></div>
    </div>
</div>

<div id="crosshair"></div>
<div id="msg">CLICK TO START<br>O/P TO GRAPPLE AT CROSSHAIR | CLICK TO SLASH</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let w, h, midX, midY;
let score = 0, gas = 100, swordTimer = 0;
let gameActive = false;

// Physics
const GRAVITY = 0.18;
const FRICTION = 0.985;
let p = { x: 0, y: -400, z: 0, vx: 0, vy: 0, vz: 0, yaw: 0, pitch: 0 };
let hooks = { o: null, p: null };
let keys = {};

// Procedural World
let entities = [];
const WORLD_SIZE = 10000;

function spawnWorld() {
    // Initial batch
    for(let i=0; i<150; i++) spawnEntity();
}

function spawnEntity() {
    const type = Math.random() > 0.1 ? 'tree' : 'titan';
    entities.push({
        type: type,
        x: p.x + (Math.random() - 0.5) * 15000,
        z: p.z + (Math.random() - 0.5) * 15000,
        h: type === 'tree' ? 800 + Math.random() * 1200 : 400 + Math.random() * 500,
        w: type === 'tree' ? 40 + Math.random() * 40 : 100,
        alive: true,
        seed: Math.random() * 100
    });
}

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    midX = w/2; midY = h/2;
}

window.addEventListener('resize', resize);
resize();

canvas.addEventListener('mousedown', (e) => {
    if(!gameActive) {
        canvas.requestPointerLock();
        gameActive = true;
        document.getElementById('msg').style.display = 'none';
    } else {
        swordTimer = 15;
    }
});

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) {
        p.yaw += e.movementX * 0.003; // Corrected Inversion
        p.pitch -= e.movementY * 0.002;
        p.pitch = Math.max(-1.4, Math.min(1.4, p.pitch));
    }
});

function raycast() {
    // Find entity closest to the center of the screen (crosshair)
    let best = null;
    let minProjectedDist = 100; // Screen-space radius

    entities.forEach(e => {
        const pos = project(e.x, -e.h * 0.8, e.z);
        if (pos) {
            const dx = pos.x - midX;
            const dy = pos.y - midY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < minProjectedDist) {
                minProjectedDist = dist;
                best = { x: e.x, y: -e.h * 0.8, z: e.z };
            }
        }
    });
    return best;
}

function update() {
    if(!gameActive) return;

    // Infinite Cleanup/Spawn
    if(entities.length < 200) spawnEntity();
    entities = entities.filter(e => Math.sqrt((e.x-p.x)**2 + (e.z-p.z)**2) < 10000);

    // Grappling
    ['o', 'p'].forEach(k => {
        if(keys[k]) {
            if(!hooks[k]) hooks[k] = raycast();
            if(hooks[k]) {
                const dx = hooks[k].x - p.x, dy = hooks[k].y - p.y, dz = hooks[k].z - p.z;
                const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
                p.vx += (dx/d) * 0.5; p.vy += (dy/d) * 0.5; p.vz += (dz/d) * 0.5;
            }
        } else { hooks[k] = null; }
    });

    if(keys[' '] && gas > 0) {
        p.vx += Math.sin(p.yaw) * 0.7;
        p.vz += Math.cos(p.yaw) * 0.7;
        p.vy -= 0.5; gas -= 0.4;
    } else { gas = Math.min(100, gas + 0.1); }

    p.vy += GRAVITY;
    p.vx *= FRICTION; p.vy *= FRICTION; p.vz *= FRICTION;
    p.x += p.vx; p.y += p.vy; p.z += p.vz;

    if(p.y > 0) { p.y = 0; p.vy = 0; }
    if(swordTimer > 0) swordTimer--;

    // Kill check
    entities.forEach(e => {
        if(e.type === 'titan' && e.alive) {
            const dx = e.x - p.x, dy = (-e.h * 0.95) - p.y, dz = e.z - p.z;
            const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
            if(d < 150 && swordTimer > 0) {
                e.alive = false; score++;
                document.getElementById('score').innerText = score;
            }
        }
    });

    document.getElementById('gas-bar').style.width = gas + '%';
}

function project(x, y, z) {
    let dx = x - p.x, dy = y - p.y, dz = z - p.z;
    let rx = dx * Math.cos(-p.yaw) - dz * Math.sin(-p.yaw);
    let rz = dx * Math.sin(-p.yaw) + dz * Math.cos(-p.yaw);
    let ry = dy * Math.cos(-p.pitch) - rz * Math.sin(-p.pitch);
    let fz = dy * Math.sin(-p.pitch) + rz * Math.cos(-p.pitch);
    if(fz < 50) return null;
    let s = 1000 / fz;
    return { x: midX + rx * s, y: midY + ry * s, s: s };
}

function drawTitan(ctx, pos, h, alive) {
    if(!alive) ctx.globalAlpha = 0.3;
    const s = pos.s;
    // Body
    ctx.fillStyle = '#d2b48c';
    ctx.fillRect(pos.x - 40*s, pos.y - h*s, 80*s, h*s); 
    // Arms
    ctx.fillRect(pos.x - 70*s, pos.y - h*s, 30*s, h*s*0.6);
    ctx.fillRect(pos.x + 40*s, pos.y - h*s, 30*s, h*s*0.6);
    // Head
    ctx.beginPath();
    ctx.arc(pos.x, pos.y - h*s - 20*s, 35*s, 0, Math.PI*2);
    ctx.fill();
    // Nape
    ctx.fillStyle = '#f00';
    ctx.fillRect(pos.x - 15*s, pos.y - h*s*0.98, 30*s, 20*s);
    ctx.globalAlpha = 1.0;
}

function draw() {
    // Sky
    ctx.fillStyle = '#1a202c'; ctx.fillRect(0,0,w,h);

    // Infinite Grass Floor (Grid)
    ctx.strokeStyle = '#2d5a27'; ctx.lineWidth = 1;
    for(let i=-5; i<20; i++) {
        const lineZ = (Math.floor(p.z/500)*500) + i*500;
        const p1 = project(p.x-5000, 0, lineZ);
        const p2 = project(p.x+5000, 0, lineZ);
        if(p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
    }

    // Depth Sort
    entities.sort((a,b) => {
        const da = (a.x-p.x)**2 + (a.z-p.z)**2;
        const db = (b.x-p.x)**2 + (b.z-p.z)**2;
        return db - da;
    });

    entities.forEach(e => {
        const pos = project(e.x, 0, e.z);
        if(!pos) return;

        if(e.type === 'tree') {
            ctx.fillStyle = '#3e2723';
            ctx.fillRect(pos.x - e.w*pos.s, pos.y - e.h*pos.s, e.w*2*pos.s, e.h*pos.s);
            ctx.fillStyle = '#1b4332';
            ctx.beginPath(); ctx.arc(pos.x, pos.y - e.h*pos.s, e.w*4*pos.s, 0, Math.PI*2); ctx.fill();
        } else {
            drawTitan(ctx, pos, e.h, e.alive);
        }
    });

    // Grapple lines
    ctx.strokeStyle = '#fff';
    ['o', 'p'].forEach(k => {
        if(hooks[k]) {
            const hpos = project(hooks[k].x, hooks[k].y, hooks[k].z);
            if(hpos) {
                ctx.beginPath();
                ctx.moveTo(k === 'o' ? w*0.2 : w*0.8, h);
                ctx.lineTo(hpos.x, hpos.y);
                ctx.stroke();
            }
        }
    });

    // Sword FX
    if(swordTimer > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 10;
        ctx.beginPath(); ctx.arc(midX, midY, 200, 0, Math.PI/2); ctx.stroke();
    }

    update();
    requestAnimationFrame(draw);
}

spawnWorld();
draw();
</script>
</body>
</html>
