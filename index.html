<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TITAN SLAYER: UNLEASHED</title>
    <style>
        body { margin: 0; background: #070a0a; overflow: hidden; font-family: 'Verdana', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 12px; height: 12px; border: 2px solid #0ff; border-radius: 50%;
        }
        #danger {
            position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(255,0,0,0.4) 100%);
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        #msg {
            position: absolute; top: 40%; width: 100%; text-align: center;
            color: white; background: rgba(0,0,0,0.7); padding: 20px;
        }
    </style>
</head>
<body>

<div id="danger"></div>
<div id="ui">
    <div style="font-size: 28px; color: #f00;">KILLS: <span id="score">0</span></div>
    <div style="margin-top:5px; letter-spacing:1px; color:#0ff;">GAS RESERVE</div>
    <div style="width: 200px; height: 12px; border: 2px solid #fff;">
        <div id="gas-bar" style="width: 100%; height: 100%; background: #0ff; box-shadow: 0 0 10px #0ff;"></div>
    </div>
</div>

<div id="crosshair"></div>
<div id="msg">SYSTEMS ONLINE<br>O / P TO GRAPPLE ANYTHING | CLICK TO SLASH</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dangerOverlay = document.getElementById('danger');

let w, h, midX, midY;
let score = 0, gas = 100, swordTimer = 0;
let gameActive = false;

// Physics & Controls
const GRAVITY = 0.22;
const FRICTION = 0.98;
let p = { x: 0, y: -500, z: 0, vx: 0, vy: 0, vz: 0, yaw: 0, pitch: 0 };
let hooks = { o: null, p: null };
let keys = {};
let particles = [];

// World Entities
let entities = [];

function spawnEntity(isFar = false) {
    const type = Math.random() > 0.15 ? 'tree' : 'titan';
    const dist = isFar ? 15000 : 8000;
    entities.push({
        type: type,
        x: p.x + (Math.random() - 0.5) * dist,
        z: p.z + (Math.random() - 0.5) * dist,
        h: type === 'tree' ? 1000 + Math.random() * 1000 : 500 + Math.random() * 600,
        w: type === 'tree' ? 50 : 120,
        alive: true,
        rot: Math.random() * Math.PI * 2
    });
}

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    midX = w/2; midY = h/2;
}
window.addEventListener('resize', resize);
resize();

canvas.addEventListener('mousedown', () => {
    if(!gameActive) {
        canvas.requestPointerLock();
        gameActive = true;
        document.getElementById('msg').style.display = 'none';
    } else {
        swordTimer = 12;
    }
});

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) {
        // FIXED INVERSION: movementX now rotates yaw correctly
        p.yaw += e.movementX * 0.003; 
        p.pitch -= e.movementY * 0.003;
        p.pitch = Math.max(-1.4, Math.min(1.4, p.pitch));
    }
});

function createBlood(x, y, z) {
    for(let i=0; i<20; i++) {
        particles.push({
            x, y, z, 
            vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, vz: (Math.random()-0.5)*20,
            life: 30
        });
    }
}

function getGrapplePoint() {
    // Raycast check: Find entity or ground closest to crosshair
    let bestPoint = null;
    let minProjDist = 150;

    // Check Entities
    entities.forEach(e => {
        const top = project(e.x, -e.h*0.5, e.z);
        if (top) {
            const d = Math.sqrt((top.x-midX)**2 + (top.y-midY)**2);
            if(d < minProjDist) {
                minProjDist = d;
                bestPoint = { x: e.x, y: -e.h*0.8, z: e.z };
            }
        }
    });

    // If nothing found, check ground (if looking down)
    if (!bestPoint && p.pitch < 0) {
        bestPoint = { x: p.x + Math.sin(p.yaw)*2000, y: 0, z: p.z + Math.cos(p.yaw)*2000 };
    }
    
    return bestPoint;
}

function update() {
    if(!gameActive) return;

    if(entities.length < 120) spawnEntity(true);
    entities = entities.filter(e => Math.sqrt((e.x-p.x)**2 + (e.z-p.z)**2) < 12000);

    // Grappling Logic
    ['o', 'p'].forEach(k => {
        if(keys[k]) {
            if(!hooks[k]) hooks[k] = getGrapplePoint();
            if(hooks[k]) {
                const dx = hooks[k].x - p.x, dy = hooks[k].y - p.y, dz = hooks[k].z - p.z;
                const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
                p.vx += (dx/d) * 0.6; p.vy += (dy/d) * 0.6; p.vz += (dz/d) * 0.6;
            }
        } else { hooks[k] = null; }
    });

    if(keys[' '] && gas > 0) {
        p.vx += Math.sin(p.yaw) * 0.8;
        p.vz += Math.cos(p.yaw) * 0.8;
        p.vy -= 0.6; gas -= 0.5;
    } else { gas = Math.min(100, gas + 0.1); }

    p.vy += GRAVITY;
    p.vx *= FRICTION; p.vy *= FRICTION; p.vz *= FRICTION;
    p.x += p.vx; p.y += p.vy; p.z += p.vz;

    if(p.y > 0) { p.y = 0; p.vy = 0; }
    if(swordTimer > 0) swordTimer--;

    let nearTitan = false;
    entities.forEach(e => {
        if(e.type === 'titan' && e.alive) {
            const dx = e.x - p.x, dy = (-e.h * 0.95) - p.y, dz = e.z - p.z;
            const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
            if(d < 1000) nearTitan = true;
            if(d < 180 && swordTimer > 0) {
                e.alive = false; score++;
                createBlood(e.x, -e.h, e.z);
                document.getElementById('score').innerText = score;
            }
        }
    });

    dangerOverlay.style.opacity = nearTitan ? "1" : "0";
    particles.forEach((pt, i) => {
        pt.x += pt.vx; pt.y += pt.vy; pt.z += pt.vz; pt.life--;
        if(pt.life <= 0) particles.splice(i, 1);
    });

    document.getElementById('gas-bar').style.width = gas + '%';
}

function project(x, y, z) {
    let dx = x - p.x, dy = y - p.y, dz = z - p.z;
    let rx = dx * Math.cos(-p.yaw) - dz * Math.sin(-p.yaw);
    let rz = dx * Math.sin(-p.yaw) + dz * Math.cos(-p.yaw);
    let ry = dy * Math.cos(-p.pitch) - rz * Math.sin(-p.pitch);
    let fz = dy * Math.sin(-p.pitch) + rz * Math.cos(-p.pitch);
    if(fz < 50) return null;
    let s = 1000 / fz;
    return { x: midX + rx * s, y: midY + ry * s, s: s };
}

function draw() {
    // Skybox Gradient
    let grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#0a0f1a'); grad.addColorStop(1, '#1a2a2a');
    ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);

    // Green Floor
    const horizon = midY + p.pitch * 600;
    ctx.fillStyle = '#1e3a1e';
    ctx.fillRect(0, horizon, w, h - horizon);

    // Sort Scene
    let scene = [...entities, ...particles.map(pt => ({...pt, type:'blood'}))];
    scene.sort((a,b) => {
        return ((b.x-p.x)**2 + (b.z-p.z)**2) - ((a.x-p.x)**2 + (a.z-p.z)**2);
    });

    scene.forEach(e => {
        const pos = project(e.x, 0, e.z);
        if(!pos) return;

        if(e.type === 'tree') {
            ctx.fillStyle = '#2b1d0e';
            ctx.fillRect(pos.x - 25*pos.s, pos.y - e.h*pos.s, 50*pos.s, e.h*pos.s);
            ctx.fillStyle = '#0f2e0f';
            ctx.beginPath(); ctx.arc(pos.x, pos.y - e.h*pos.s, 150*pos.s, 0, Math.PI*2); ctx.fill();
        } else if(e.type === 'titan') {
            if(!e.alive) ctx.globalAlpha = 0.2;
            const s = pos.s;
            ctx.fillStyle = '#e5c29f';
            // Legs/Body
            ctx.fillRect(pos.x-40*s, pos.y-e.h*s, 80*s, e.h*s);
            // Head
            ctx.beginPath(); ctx.arc(pos.x, pos.y-e.h*s-30*s, 40*s, 0, Math.PI*2); ctx.fill();
            // Nape
            ctx.fillStyle = '#f00';
            ctx.fillRect(pos.x-15*s, pos.y-e.h*s*0.98, 30*s, 20*s);
            ctx.globalAlpha = 1;
        } else if(e.type === 'blood') {
            const bPos = project(e.x, e.y, e.z);
            if(bPos) {
                ctx.fillStyle = '#f00';
                ctx.fillRect(bPos.x, bPos.y, 4*bPos.s, 4*bPos.s);
            }
        }
    });

    // Grapples
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ['o', 'p'].forEach(k => {
        if(hooks[k]) {
            const hp = project(hooks[k].x, hooks[k].y, hooks[k].z);
            if(hp) {
                ctx.beginPath(); ctx.moveTo(k === 'o' ? w*0.1 : w*0.9, h);
                ctx.lineTo(hp.x, hp.y); ctx.stroke();
            }
        }
    });

    // Slash VFX
    if(swordTimer > 0) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 8; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(midX, midY, 180, 0, Math.PI*0.4); ctx.stroke();
    }

    update();
    requestAnimationFrame(draw);
}

for(let i=0; i<80; i++) spawnEntity();
draw();
</script>
</body>
</html>
