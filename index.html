<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TITAN SLAYER: TRUE 3D</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
        #danger-flash {
            position: absolute; inset: 0; background: radial-gradient(circle, transparent 30%, rgba(255,0,0,0.5) 100%);
            opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="danger-flash"></div>
<div id="ui">
    <div style="font-size: 24px; color: #ff4444;">ELIMINATIONS: <span id="score">0</span></div>
    <div style="margin-top: 10px;">GAS: <div style="width:200px; height:8px; background:#333;"><div id="gas-bar" style="width:100%; height:100%; background:#00ffff;"></div></div></div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let w, h, midX, midY;
let score = 0, gas = 100, swordTimer = 0, gameActive = false;
let grappleIndicator = null;

// Camera & Physics
const FOV = 800;
let p = { x: 0, y: -500, z: 0, vx: 0, vy: 0, vz: 0, yaw: 0, pitch: 0 };
let hooks = { o: null, p: null };
let keys = {};
let entities = [];
let blood = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    midX = w/2; midY = h/2;
}
window.addEventListener('resize', resize);
resize();

// Input
canvas.addEventListener('mousedown', () => {
    if(!gameActive) { canvas.requestPointerLock(); gameActive = true; }
    else { swordTimer = 15; }
});
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) {
        p.yaw -= e.movementX * 0.003; // INVERTED back as requested
        p.pitch -= e.movementY * 0.003;
        p.pitch = Math.max(-1.4, Math.min(1.4, p.pitch));
    }
});

function createEntity(zOffset = 0) {
    const isTitan = Math.random() > 0.85;
    return {
        type: isTitan ? 'titan' : 'tree',
        x: p.x + (Math.random() - 0.5) * 15000,
        z: p.z + (Math.random() - 0.5) * 15000 + zOffset,
        h: isTitan ? 500 + Math.random()*400 : 1200 + Math.random()*1000,
        w: isTitan ? 120 : 60,
        alive: true,
        walk: Math.random() * Math.PI * 2
    };
}

function project(x, y, z) {
    let dx = x - p.x, dy = y - p.y, dz = z - p.z;
    // Rotation
    let cosY = Math.cos(p.yaw), sinY = Math.sin(p.yaw);
    let cosP = Math.cos(p.pitch), sinP = Math.sin(p.pitch);
    
    let x1 = dx * cosY - dz * sinY;
    let z1 = dx * sinY + dz * cosY;
    let y1 = dy * cosP - z1 * sinP;
    let z2 = dy * sinP + z1 * cosP;

    if (z2 < 50) return null;
    let s = FOV / z2;
    return { x: midX + x1 * s, y: midY + y1 * s, s: s, depth: z2 };
}

function update() {
    if(!gameActive) return;

    // Infinite Generation
    while(entities.length < 150) entities.push(createEntity(5000));
    entities = entities.filter(e => {
        const d = Math.sqrt((e.x-p.x)**2 + (e.z-p.z)**2);
        return d < 12000;
    });

    // Grapple Target Logic (Nearest to center)
    let best = null, minDist = 150;
    entities.forEach(e => {
        let pt = project(e.x, -e.h*0.8, e.z);
        if(pt) {
            let d = Math.sqrt((pt.x-midX)**2 + (pt.y-midY)**2);
            if(d < minDist) { minDist = d; best = { x: e.x, y: -e.h*0.8, z: e.z }; }
        }
    });
    grappleIndicator = best;

    // Physics
    ['o', 'p'].forEach(k => {
        if(keys[k]) {
            if(!hooks[k]) hooks[k] = grappleIndicator;
            if(hooks[k]) {
                const dx = hooks[k].x - p.x, dy = hooks[k].y - p.y, dz = hooks[k].z - p.z;
                const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
                p.vx += (dx/d) * 0.7; p.vy += (dy/d) * 0.7; p.vz += (dz/d) * 0.7;
            }
        } else { hooks[k] = null; }
    });

    if(keys[' '] && gas > 0) {
        p.vx += Math.sin(-p.yaw) * 0.8;
        p.vz += Math.cos(-p.yaw) * 0.8;
        p.vy -= 0.6; gas -= 0.4;
    } else gas = Math.min(100, gas + 0.1);

    p.vy += 0.2; p.vx *= 0.98; p.vy *= 0.98; p.vz *= 0.98;
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    if(p.y > 0) { p.y = 0; p.vy = 0; }
    if(swordTimer > 0) swordTimer--;

    // Titan AI & Collision
    let danger = 0;
    entities.forEach(e => {
        if(e.type === 'titan' && e.alive) {
            // Walk toward player
            e.walk += 0.1;
            let ang = Math.atan2(p.x - e.x, p.z - e.z);
            e.x += Math.sin(ang) * 5; e.z += Math.cos(ang) * 5;

            let dx = e.x - p.x, dy = (-e.h*0.9)-p.y, dz = e.z - p.z;
            let dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
            if(dist < 1000) danger = 1;
            if(dist < 180 && swordTimer > 0) {
                e.alive = false; score++; 
                document.getElementById('score').innerText = score;
                for(let i=0; i<15; i++) blood.push({x:e.x, y:-e.h, z:e.z, vx:(Math.random()-0.5)*30, vy:(Math.random()-0.5)*30, vz:(Math.random()-0.5)*30, l:40});
            }
        }
    });
    document.getElementById('danger-flash').style.opacity = danger ? "0.6" : "0";
    document.getElementById('gas-bar').style.width = gas + "%";
    blood.forEach((b, i) => { b.x+=b.vx; b.y+=b.vy; b.z+=b.vz; b.l--; if(b.l<0) blood.splice(i,1); });
}

function draw() {
    ctx.fillStyle = '#0a0d14'; ctx.fillRect(0,0,w,h);
    
    // Floor
    const horizon = midY + p.pitch * 800;
    ctx.fillStyle = '#142614';
    ctx.fillRect(0, horizon, w, h - horizon);

    // Render Scene
    let drawList = [...entities, ...blood.map(b=>({...b, type:'blood'}))];
    drawList.map(e => ({...e, proj: project(e.x, 0, e.z)})).filter(e => e.proj)
    .sort((a,b) => b.proj.depth - a.proj.depth)
    .forEach(e => {
        const {x, y, s} = e.proj;
        if(e.type === 'tree') {
            ctx.fillStyle = '#26190e'; ctx.fillRect(x - 25*s, y - e.h*s, 50*s, e.h*s);
            ctx.fillStyle = '#0f240f'; ctx.beginPath(); ctx.arc(x, y - e.h*s, 140*s, 0, 7); ctx.fill();
        } else if(e.type === 'titan') {
            if(!e.alive) ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#e0c0a0';
            // Procedural legs
            let legW = Math.sin(e.walk) * 30 * s;
            ctx.fillRect(x - 40*s, y - e.h*s*0.5, 30*s, e.h*s*0.5);
            ctx.fillRect(x + 10*s, y - e.h*s*0.5, 30*s, e.h*s*0.5);
            // Torso & Head
            ctx.fillRect(x - 50*s, y - e.h*s, 100*s, e.h*s*0.6);
            ctx.beginPath(); ctx.arc(x, y - e.h*s - 30*s, 45*s, 0, 7); ctx.fill();
            // Nape
            ctx.fillStyle = '#f00'; ctx.fillRect(x - 15*s, y - e.h*s*0.95, 30*s, 20*s);
            ctx.globalAlpha = 1;
        } else if(e.type === 'blood') {
            let bp = project(e.x, e.y, e.z);
            if(bp) { ctx.fillStyle = '#900'; ctx.fillRect(bp.x, bp.y, 5*bp.s, 5*bp.s); }
        }
    });

    // HUD: Grapple Indicator
    if(grappleIndicator) {
        let gpt = project(grappleIndicator.x, grappleIndicator.y, grappleIndicator.z);
        if(gpt) {
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(gpt.x, gpt.y, 15, 0, 7); ctx.stroke();
        }
    }

    // Ropes
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ['o', 'p'].forEach(k => {
        if(hooks[k]) {
            let hp = project(hooks[k].x, hooks[k].y, hooks[k].z);
            if(hp) { ctx.beginPath(); ctx.moveTo(k==='o'?0:w, h); ctx.lineTo(hp.x, hp.y); ctx.stroke(); }
        }
    });

    // Slash
    if(swordTimer > 0) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 10; ctx.beginPath();
        ctx.arc(midX, midY, 200, 0, 1); ctx.stroke();
    }

    update();
    requestAnimationFrame(draw);
}

resize();
draw();
</script>
</body>
</html>
