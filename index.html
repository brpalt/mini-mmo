<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GilbertAPI | Control Panel</title>
    <style>
        :root { --discord-blue: #5865F2; --dark-bg: #232428; --card-bg: #2b2d31; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: #dbdee1; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #3f4147; }
        input, select { background: #1e1f22; border: 1px solid #1e1f22; color: white; padding: 10px; border-radius: 4px; width: 100%; margin-top: 5px; }
        .code-block { background: #000; color: #a3ffb4; padding: 15px; border-radius: 5px; position: relative; font-family: monospace; }
        .method { font-weight: bold; color: #f29033; }
        label { font-size: 0.9rem; color: #b5bac1; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛰️ GilbertAPI Builder</h1>
        
        <div class="card">
            <h3>1. Configure Giveaway</h3>
            <div class="grid">
                <div>
                    <label>Duration (Hours)</label>
                    <input type="number" id="opt_dur" value="24" oninput="updateBuilder()">
                </div>
                <div>
                    <label>Amount of Winners</label>
                    <input type="number" id="opt_win" value="1" oninput="updateBuilder()">
                </div>
            </div>
            <div style="margin-top:15px;">
                <label>Prize Name</label>
                <input type="text" id="opt_prize" value="Discord Nitro" oninput="updateBuilder()">
            </div>
        </div>

        <div class="card">
            <h3>2. Bot Implementation Info</h3>
            <p>Use these details in your bot script:</p>
            
            <label>Endpoint URL</label>
            <div class="code-block">http://your-ip-or-domain/gilbertapi/start</div>
            
            <br>
            <label>Request Method</label>
            <div class="code-block" style="color: #f29033;">POST</div>

            <br>
            <label>JSON Payload (What to send)</label>
            <pre class="code-block" id="json_output"></pre>
        </div>
    </div>

    <script>
        function updateBuilder() {
            const dur = document.getElementById('opt_dur').value;
            const win = document.getElementById('opt_win').value;
            const prize = document.getElementById('opt_prize').value;

            const payload = {
                serverId: "INTERACTION_GUILD_ID",
                duration: parseInt(dur),
                winners: parseInt(win),
                prize: prize,
                timestamp: Date.now()
            };

            document.getElementById('json_output').textContent = JSON.stringify(payload, null, 4);
        }
        updateBuilder();
    </script>
</body>
</html>
