<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TITAN HUNTER: FOREST ODYSSEY</title>
    <style>
        body { margin: 0; background: #1a2a1a; overflow: hidden; font-family: 'Verdana', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #fff;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
        .crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;
        }
        #msg {
            position: absolute; top: 40%; width: 100%; text-align: center;
            color: white; background: rgba(0,0,0,0.7); padding: 20px 0; display: block;
        }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-size: 24px;">KILLS: <span id="score">0</span></div>
    <div>GAS: <div style="width:100px; height:10px; border:1px solid #fff;"><div id="gas-bar" style="width:100%; height:100%; background:#0ff;"></div></div></div>
</div>

<div id="msg">
    <h1>SCOUT REGIMENT TRAINING</h1>
    <p>CLICK TO BEGIN</p>
    <p>LEFT/RIGHT CLICK TO GRAPPLE TREES | SPACE TO BOOST | AIM FOR THE RED NECKS</p>
</div>

<div class="crosshair"></div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let w, h, midX, midY;
let gameActive = false;
let score = 0;
let gas = 100;

// Physics Constants
const GRAVITY = 0.15;
const FRICTION = 0.98;
const GRAPPLE_STRENGTH = 0.04;

// Player State
let p = { x: 0, y: -500, z: 0, vx: 0, vy: 0, vz: 0, yaw: 0, pitch: 0 };
let leftAnchor = null, rightAnchor = null;

// Entities
let trees = [];
let titans = [];

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    midX = w/2; midY = h/2;
    
    // Generate Forest
    for(let i=0; i<60; i++) {
        trees.push({
            x: (Math.random()-0.5) * 10000,
            z: (Math.random()-0.5) * 10000,
            w: 40 + Math.random()*60,
            h: 800 + Math.random()*1000
        });
    }
    spawnTitans();
}

function spawnTitans() {
    for(let i=0; i<10; i++) {
        titans.push({
            x: (Math.random()-0.5) * 8000,
            z: (Math.random()-0.5) * 8000,
            size: 200 + Math.random()*300,
            alive: true
        });
    }
}

window.addEventListener('resize', init);
canvas.addEventListener('mousedown', (e) => {
    if(!gameActive) {
        canvas.requestPointerLock();
        gameActive = true;
        document.getElementById('msg').style.display = 'none';
        return;
    }
    // Find closest tree in look direction for grappling
    let anchor = findGrapplePoint();
    if(e.button === 0) leftAnchor = anchor;
    if(e.button === 2) rightAnchor = anchor;
});

window.addEventListener('mouseup', (e) => {
    if(e.button === 0) leftAnchor = null;
    if(e.button === 2) rightAnchor = null;
});

window.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === canvas) {
        p.yaw += e.movementX * 0.003;
        p.pitch -= e.movementY * 0.003;
        p.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, p.pitch));
    }
});

let keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function findGrapplePoint() {
    // Simplified: Hook onto the nearest tree in front of you
    let best = null;
    let minDist = 3000;
    trees.forEach(t => {
        let dx = t.x - p.x;
        let dz = t.z - p.z;
        let dist = Math.sqrt(dx*dx + dz*dz);
        if(dist < minDist) {
            minDist = dist;
            best = { x: t.x, y: -t.h * 0.8, z: t.z };
        }
    });
    return best;
}

function update() {
    if(!gameActive) return;

    // Grapple Physics
    [leftAnchor, rightAnchor].forEach(a => {
        if(a) {
            p.vx += (a.x - p.x) * GRAPPLE_STRENGTH;
            p.vy += (a.y - p.y) * GRAPPLE_STRENGTH;
            p.vz += (a.z - p.z) * GRAPPLE_STRENGTH;
        }
    });

    // Gas Boost
    if(keys['Space'] && gas > 0) {
        p.vx += Math.sin(p.yaw) * 0.5;
        p.vz += Math.cos(p.yaw) * 0.5;
        p.vy -= 0.6;
        gas -= 0.5;
    } else {
        gas = Math.min(100, gas + 0.1);
    }

    p.vy += GRAVITY;
    p.vx *= FRICTION; p.vy *= FRICTION; p.vz *= FRICTION;
    p.x += p.vx; p.y += p.vy; p.z += p.vz;

    // Ground collision
    if(p.y > 0) { p.y = 0; p.vy = 0; }

    // Titan Kill Check
    titans.forEach(t => {
        if(!t.alive) return;
        let dx = t.x - p.x;
        let dy = (-t.size*0.9) - p.y;
        let dz = t.z - p.z;
        let dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if(dist < 100) { // Hit weak spot
            t.alive = false;
            score++;
            document.getElementById('score').innerText = score;
        }
    });

    document.getElementById('gas-bar').style.width = gas + '%';
}

function project(x, y, z) {
    // 3D to 2D Translation
    let dx = x - p.x;
    let dy = y - p.y;
    let dz = z - p.z;

    // Rotate around Y (Yaw)
    let rx = dx * Math.cos(-p.yaw) - dz * Math.sin(-p.yaw);
    let rz = dx * Math.sin(-p.yaw) + dz * Math.cos(-p.yaw);
    
    // Rotate around X (Pitch)
    let ry = dy * Math.cos(-p.pitch) - rz * Math.sin(-p.pitch);
    let fz = dy * Math.sin(-p.pitch) + rz * Math.cos(-p.pitch);

    if(fz < 10) return null;
    let s = 800 / fz;
    return { x: midX + rx * s, y: midY + ry * s, scale: s };
}

function draw() {
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(0,0,w,h);

    // Draw Ground
    ctx.fillStyle = '#2d4d2d';
    ctx.fillRect(0, h/2 + p.pitch*500, w, h);

    // Sort objects by distance
    let objects = [
        ...trees.map(t => ({...t, type:'tree'})),
        ...titans.map(t => ({...t, type:'titan'}))
    ];
    objects.sort((a,b) => {
        let distA = Math.pow(a.x-p.x,2) + Math.pow(a.z-p.z,2);
        let distB = Math.pow(b.x-p.x,2) + Math.pow(b.z-p.z,2);
        return distB - distA;
    });

    objects.forEach(obj => {
        if(obj.type === 'tree') {
            let pos = project(obj.x, 0, obj.z);
            if(!pos) return;
            ctx.fillStyle = '#3e2723';
            ctx.fillRect(pos.x - obj.w*pos.scale/2, pos.y - obj.h*pos.scale, obj.w*pos.scale, obj.h*pos.scale);
        } else if(obj.alive) {
            let pos = project(obj.x, 0, obj.z);
            if(!pos) return;
            // Titan Body
            ctx.fillStyle = '#d7ccc8';
            ctx.fillRect(pos.x - obj.size*pos.scale/2, pos.y - obj.size*pos.scale*2, obj.size*pos.scale, obj.size*pos.scale*2);
            // Weak Spot (Neck)
            ctx.fillStyle = 'red';
            ctx.fillRect(pos.x - 20*pos.scale, pos.y - obj.size*pos.scale*1.9, 40*pos.scale, 20*pos.scale);
        }
    });

    // Draw Ropes
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 2;
    [leftAnchor, rightAnchor].forEach(a => {
        if(a) {
            let pos = project(a.x, a.y, a.z);
            if(pos) {
                ctx.beginPath();
                ctx.moveTo(midX, h);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            }
        }
    });

    update();
    requestAnimationFrame(draw);
}

init();
draw();
</script>
</body>
</html>
