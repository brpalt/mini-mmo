<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini MMO - Stick Figure Strike</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="ui">
        <div id="setup">
            <input type="text" id="username" placeholder="Username" maxlength="10">
            <button onclick="startApp()">Start</button>
        </div>
        <div id="multiplayer" style="display:none;">
            <div id="status">Online</div>
            <input type="text" id="joinId" placeholder="Friend's ID">
            <button onclick="joinGame()">Join</button>
            <div id="my-id-display">ID: <span id="my-id">...</span></div>
        </div>
        <div id="inventory">Items: <span id="item-list">None</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
