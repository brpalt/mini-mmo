<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STARFIGHTER: EXTERNAL VIEW</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; cursor: none; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #0f0;
            pointer-events: none; letter-spacing: 2px;
        }
        #ui-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; text-align: center; background: rgba(0,0,0,0.8);
            padding: 20px; border: 2px solid #0ff; display: block;
        }
        .shield-container { width: 200px; height: 15px; border: 2px solid #0f0; margin-top: 5px; }
        #shield-bar { width: 100%; height: 100%; background: #0f0; transition: 0.1s; }
    </style>
</head>
<body>

<div id="hud">
    DISTANCE: <span id="dist">0</span>m<br>
    SHIELD status
    <div class="shield-container"><div id="shield-bar"></div></div>
</div>

<div id="ui-msg" id="startScreen">
    <h1>VOID RUNNER</h1>
    <p>CLICK TO ENGAGE ENGINES</p>
    <p style="font-size: 0.8rem; color: #0ff;">USE MOUSE TO STEER | COLLECT BLUE ORBS</p>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const shieldBar = document.getElementById('shield-bar');
const distEl = document.getElementById('dist');
const uiMsg = document.getElementById('ui-msg');

let w, h;
let gameActive = false;
let distance = 0;
let shield = 100;

// Ship variables
let ship = { x: 0, y: 0, targetX: 0, targetY: 0, tilt: 0 };
let obstacles = [];
let powerups = [];
let stars = Array.from({length: 150}, () => ({ x: Math.random()-0.5, y: Math.random()-0.5, z: Math.random()*1000 }));

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Mouse Locking & Direct Movement
canvas.addEventListener('mousedown', () => {
    if(!gameActive) {
        canvas.requestPointerLock();
        gameActive = true;
        uiMsg.style.display = 'none';
        resetGame();
    }
});

window.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === canvas) {
        // Direct movement sensitivity
        ship.targetX += e.movementX * 0.002;
        ship.targetY += e.movementY * 0.002;
        
        // Clamp ship to screen bounds
        ship.targetX = Math.max(-1.2, Math.min(1.2, ship.targetX));
        ship.targetY = Math.max(-0.8, Math.min(0.8, ship.targetY));
        
        // Set tilt based on horizontal movement
        ship.tilt = e.movementX * 0.05;
    }
});

function resetGame() {
    shield = 100;
    distance = 0;
    obstacles = [];
    powerups = [];
    loop();
}

function drawShip() {
    const screenX = w/2 + ship.x * w * 0.4;
    const screenY = h/2 + ship.y * h * 0.4;
    
    ctx.save();
    ctx.translate(screenX, screenY);
    ctx.rotate(ship.tilt); // Barrel roll tilt

    // Engine Glow
    const flicker = Math.random() * 10;
    ctx.shadowBlur = 15 + flicker;
    ctx.shadowColor = '#0ff';
    
    // Wings
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.moveTo(-40, 10); ctx.lineTo(-60, 25); ctx.lineTo(60, 25); ctx.lineTo(40, 10);
    ctx.fill();

    // Body
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.moveTo(0, -25); ctx.lineTo(-15, 15); ctx.lineTo(15, 15);
    ctx.closePath();
    ctx.fill();

    // Cockpit Window
    ctx.fillStyle = '#0cf';
    ctx.fillRect(-5, -5, 10, 8);
    
    // Engine Flare
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 18, 5 + flicker/2, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
    ctx.shadowBlur = 0;
}

function update() {
    if (!gameActive) return;

    distance += 2;
    // Smooth Interpolation for Ship
    ship.x += (ship.targetX - ship.x) * 0.15;
    ship.y += (ship.targetY - ship.y) * 0.15;
    ship.tilt *= 0.9; // Return to level

    // Spawn Logic
    if (Math.random() < 0.1) {
        obstacles.push({
            z: 2000,
            x: (Math.random() - 0.5) * 6,
            y: (Math.random() - 0.5) * 4,
            size: 30 + Math.random() * 80,
            seed: Math.random() * 10
        });
    }
    if (Math.random() < 0.01) {
        powerups.push({ z: 2000, x: (Math.random()-0.5)*4, y: (Math.random()-0.5)*3 });
    }

    // Move Obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.z -= 30; // Speed of travel

        // Collision logic
        if (o.z < 150 && o.z > 50) {
            let dx = o.x - ship.x;
            let dy = o.y - ship.y;
            if (Math.sqrt(dx*dx + dy*dy) < 0.3) {
                shield -= 20;
                obstacles.splice(i, 1);
                if (shield <= 0) {
                    gameActive = false;
                    uiMsg.style.display = 'block';
                    uiMsg.innerHTML = `<h1>HULL DESTROYED</h1><p>DISTANCE: ${distance}m</p><button onclick="location.reload()" style="padding:10px; cursor:pointer">RETRY</button>`;
                    document.exitPointerLock();
                }
            }
        }
        if (o.z < -100) obstacles.splice(i, 1);
    }

    // Move Powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
        let p = powerups[i];
        p.z -= 30;
        if (p.z < 150 && p.z > 50) {
            let dx = p.x - ship.x;
            let dy = p.y - ship.y;
            if (Math.sqrt(dx*dx + dy*dy) < 0.4) {
                shield = Math.min(100, shield + 25);
                powerups.splice(i, 1);
            }
        }
        if (p.z < -100) powerups.splice(i, 1);
    }

    shieldBar.style.width = shield + '%';
    shieldBar.style.backgroundColor = shield < 30 ? '#f00' : '#0f0';
    distEl.innerText = distance;
}

function draw() {
    // Clear with Fade Effect (Motion Blur)
    ctx.fillStyle = 'rgba(0, 0, 5, 0.4)';
    ctx.fillRect(0, 0, w, h);

    // Stars
    ctx.fillStyle = '#fff';
    stars.forEach(s => {
        s.z -= 20; if(s.z <= 1) s.z = 1000;
        let sc = 400/s.z;
        ctx.fillRect(w/2 + s.x*w*sc, h/2 + s.y*h*sc, 2, 2);
    });

    // Render Entities
    const entities = [...obstacles.map(o => ({...o, type:'obs'})), ...powerups.map(p => ({...p, type:'pow'}))];
    entities.sort((a,b) => b.z - a.z);

    entities.forEach(e => {
        let sc = 600 / e.z;
        if (sc < 0) return;
        let x = w/2 + (e.x - ship.x * 0.5) * w * sc; // Slight parallax
        let y = h/2 + (e.y - ship.y * 0.5) * h * sc;

        if (e.type === 'pow') {
            ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
            ctx.fillStyle = '#0ff';
            ctx.beginPath(); ctx.arc(x, y, 10*sc, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        } else {
            ctx.fillStyle = '#555';
            ctx.beginPath();
            for(let i=0; i<6; i++) {
                let r = e.size * sc * (0.8 + Math.sin(e.seed + i));
                let ang = (i/6)*Math.PI*2;
                ctx.lineTo(x + Math.cos(ang)*r, y + Math.sin(ang)*r);
            }
            ctx.fill();
            ctx.strokeStyle = '#222'; ctx.stroke();
        }
    });

    drawShip();

    if (gameActive) requestAnimationFrame(draw);
}

// Kick off logic
setInterval(update, 1000/60);
draw();
</script>
</body>
</html>
